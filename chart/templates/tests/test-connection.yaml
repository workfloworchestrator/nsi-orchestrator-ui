apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "nsi-orchestrator-ui.fullname" . }}-test-connection"
  labels:
    {{- include "nsi-orchestrator-ui.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['-q', '-O', '/dev/null', 'http://{{ include "nsi-orchestrator-ui.fullname" . }}:{{ .Values.service.port }}/']
  restartPolicy: Never
